name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
    
    - name: Install dependencies
      run: |
        uv sync --extra dev
    
    - name: Run linter
      run: |
        uv run ruff check .
    
    - name: Run tests
      run: |
        uv run pytest tests/ -v --tb=short
    
    - name: Type checking
      run: |
        uv run mypy . || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify deployment files
      run: |
        echo "Checking required files..."
        test -f requirements.txt || exit 1
        test -f app.py || exit 1
        test -f .streamlit/config.toml || exit 1
        echo "✅ All deployment files present"
    
    - name: Deploy to Streamlit Cloud
      run: |
        echo "🚀 Deployment handled automatically by Streamlit Cloud"
        echo "Ensure auto-deploy is enabled in Streamlit Cloud dashboard"
        echo "📝 See DEPLOYMENT.md for instructions"
